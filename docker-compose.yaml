services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gofreight_api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/config/local.yaml
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_NAME=gofreight
      - HTTP_SERVER_ADDRESS=0.0.0.0:8080
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: gofreight_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: gofreight
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: