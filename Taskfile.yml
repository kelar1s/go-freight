version: '3'

dotenv: ['.env']

vars:
  CONFIG_PATH: './config/local.yaml'
  APP_ENTRY: 'cmd/gofreight/main.go'
  DOCKER_CONFIG: 'docker-compose.yml'
  DB_DSN: "user=postgres password={{.DB_PASSWORD}} dbname=gofreight host=localhost port=5433 sslmode=disable"
  MIGRATIONS_DIR: "db/migrations/inventory"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  up:
    desc: "Собрать и поднять всё в Docker (с пересборкой)"
    cmds:
      - docker compose up -d --build

  db:
    desc: "Поднять только базу данных"
    cmds:
      - docker compose up -d db
      
  migrate-up:
    desc: "Накатить миграции склада"
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_DSN}}" up

  migrate-status:
    desc: "Проверить статус миграций"
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_DSN}}" status

  down:
    desc: "Остановить и удалить контейнеры и сети"
    cmds:
      - docker compose down

  logs:
    desc: "Смотреть логи приложения в реальном времени"
    cmds:
      - docker logs -f gofreight_api

  run:
    desc: "Запустить сервер локально (нужен поднятый 'task db')"
    cmds:
      - CONFIG_PATH={{.CONFIG_PATH}} go run {{.APP_ENTRY}}

  test:
    desc: "Запустить все тесты"
    cmds:
      - go test -v -race -timeout 30s ./...

  cover:
    desc: "Покрытие кода в браузере"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out
      - rm coverage.out

  gen:
    desc: "Генерация моков и sqlc"
    cmds:
      - go generate ./...
      - sqlc generate
    silent: false

  tidy:
    desc: "Очистить и обновить зависимости go.mod"
    cmds:
      - go mod tidy
      - go mod verify

  lint:
    desc: "Запустить линтер"
    cmds:
      - golangci-lint run